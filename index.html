<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kinematic Drawing App</title>
<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
    background: white;
}

#toolbar {
    position: fixed;
    top: 0;
    width: 100%;
    height: 60px;
    background: #f0f0f0;
    display: flex;
    align-items: center;
    padding-left: 10px;
    z-index: 10;
}

button {
    margin-right: 15px;
    padding: 10px 20px;
    font-size: 16px;
}

canvas {
    position: absolute;
    top: 60px;
    left: 0;
    touch-action: none;
}
</style>
</head>
<body>

<div id="toolbar">
    <button onclick="clearCanvas()">Clear</button>
    <button onclick="saveData()">Save</button>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight - 60;

let drawing = false;
let strokeID = 0;

let lastPoint = null;
let lastTime = null;
let lastVelocity = 0;
let lastAcceleration = 0;

let rawData = [];

function dist(p1, p2) {
    return Math.hypot(p2.x - p1.x, p2.y - p1.y);
}

canvas.addEventListener("pointerdown", function(e) {

    drawing = true;
    strokeID++;

    lastPoint = {x: e.offsetX, y: e.offsetY};
    lastTime = e.timeStamp / 1000;

    ctx.beginPath();
    ctx.moveTo(lastPoint.x, lastPoint.y);
});

canvas.addEventListener("pointermove", function(e) {

    if (!drawing) return;

    let currentTime = e.timeStamp / 1000;
    let currentPoint = {x: e.offsetX, y: e.offsetY};

    let dt = currentTime - lastTime;
    if (dt <= 0) return;

    let distance = dist(lastPoint, currentPoint);
    let velocity = distance / dt;
    let acceleration = (velocity - lastVelocity) / dt;
    let jerk = (acceleration - lastAcceleration) / dt;

    let pauseWithin = velocity < 5 ? 1 : 0;

    rawData.push({
        stroke: strokeID,
        time: currentTime,
        x: currentPoint.x,
        y: currentPoint.y,
        velocity: velocity,
        acceleration: acceleration,
        jerk: jerk,
        pressure: e.pressure || 0,
        tiltX: e.tiltX || 0,
        tiltY: e.tiltY || 0,
        pauseWithin: pauseWithin
    });

    ctx.lineWidth = 2;
    ctx.lineTo(currentPoint.x, currentPoint.y);
    ctx.stroke();

    lastPoint = currentPoint;
    lastTime = currentTime;
    lastVelocity = velocity;
    lastAcceleration = acceleration;
});

canvas.addEventListener("pointerup", function(e) {
    drawing = false;
});

function clearCanvas() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    rawData = [];
    strokeID = 0;
}

function saveData() {

    if (rawData.length === 0) {
        alert("No data recorded.");
        return;
    }

    // ----- CREATE CSV STRING -----
    let csv = "stroke,time,x,y,velocity,acceleration,jerk,pressure,tiltX,tiltY,pauseWithin\n";

    rawData.forEach(row => {
        csv += `${row.stroke},${row.time},${row.x},${row.y},${row.velocity},${row.acceleration},${row.jerk},${row.pressure},${row.tiltX},${row.tiltY},${row.pauseWithin}\n`;
    });

    // ----- OPEN CSV IN NEW TAB (Safari-safe) -----
    let encodedUri = "data:text/csv;charset=utf-8," + encodeURIComponent(csv);
    window.open(encodedUri, "_blank");

    // ----- SAVE IMAGE (unchanged, works already) -----
    canvas.toBlob(function(blob) {
        let imgLink = document.createElement("a");
        imgLink.href = URL.createObjectURL(blob);
        imgLink.download = "drawing_image.png";
        imgLink.click();
    });
}

</script>

</body>
</html>
