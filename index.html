<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>iPad Kinematic Capture</title>
<style>
body { margin:0; overflow:hidden; }
canvas { width:100vw; height:100vh; touch-action:none; }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
const socket = new WebSocket("ws://YOUR_IP_HERE:8765");

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let drawing = false;
let strokeID = 0;

let lastX=0, lastY=0;
let lastTime=0;
let lastVelocity=0;
let lastAcceleration=0;

function dist(x1,y1,x2,y2){
  return Math.hypot(x2-x1,y2-y1);
}

function sendData(data){
  if(socket.readyState === WebSocket.OPEN){
    socket.send(JSON.stringify(data));
  }
}

canvas.addEventListener("pointerdown", e=>{
  if(e.pointerType !== "pen") return;

  drawing = true;
  strokeID++;

  lastX = e.offsetX;
  lastY = e.offsetY;
  lastTime = performance.now()/1000;
  lastVelocity = 0;
  lastAcceleration = 0;

  ctx.beginPath();
  ctx.moveTo(lastX,lastY);
});

canvas.addEventListener("pointermove", e=>{
  if(!drawing) return;

  const t = performance.now()/1000;
  const x = e.offsetX;
  const y = e.offsetY;

  const dt = t-lastTime;
  if(dt<=0) return;

  const d = dist(lastX,lastY,x,y);
  const velocity = d/dt;
  const acceleration = (velocity-lastVelocity)/dt;
  const jerk = (acceleration-lastAcceleration)/dt;

  ctx.lineTo(x,y);
  ctx.stroke();

  sendData({
    stroke: strokeID,
    time: t,
    x: x,
    y: y,
    velocity: velocity,
    acceleration: acceleration,
    jerk: jerk,
    pressure: e.pressure || 0,
    tiltX: e.tiltX || 0,
    tiltY: e.tiltY || 0,
    twist: e.twist || 0
  });

  lastX=x;
  lastY=y;
  lastTime=t;
  lastVelocity=velocity;
  lastAcceleration=acceleration;
});

canvas.addEventListener("pointerup", ()=>{
  drawing=false;
});
</script>

</body>
</html>
